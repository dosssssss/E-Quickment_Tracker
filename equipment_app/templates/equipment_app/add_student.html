{% extends 'equipment_app/base.html' %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Add Student</h1>
</div>

<div class="card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Student ID</label>
            <input type="text" name="student_id" class="form-control" required placeholder="e.g. 2021-00123">
        </div>

        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required placeholder="Full Name">
        </div>

        <div class="form-group">
            <label class="form-label">Course</label>
            <input type="text" name="course" class="form-control" required placeholder="e.g. BSCS">
        </div>

        <div class="form-group">
            <label class="form-label">Year Level</label>
            <input type="number" name="year_level" class="form-control" required min="1" max="6">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Student</button>
            <a href="/students/" class="btn" style="background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
