{% extends 'equipment_app/base.html' %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Edit Equipment</h1>
</div>

<div class="card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Equipment Name</label>
            <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Total Quantity</label>
            <input type="number" name="total_quantity" class="form-control" value="{{ item.total_quantity }}" required min="1">
        </div>

        <div class="form-group">
            <label class="form-label">Available Quantity</label>
            <input type="number" name="available_quantity" class="form-control" value="{{ item.available_quantity }}" required min="0">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Update Equipment</button>
            <a href="/equipment/" class="btn" style="background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
