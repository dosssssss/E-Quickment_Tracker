<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E-QuickTracker Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background:#0f1115;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
.login-box{
    background:#171a21;
    padding:40px;
    border-radius:16px;
    width:380px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2 class="mb-4 text-center">E-QuickTracker</h2>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control">
        </div>

        <button class="btn btn-primary w-100">Login</button>
    </form>
</div>

</body>
</html>
